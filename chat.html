<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>PDF 챗봇</title>
    <!-- 마크다운 렌더링 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 수식 렌더링 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body, {delimiters: [
            {left:'$$', right:'$$', display:true},
            {left:'$', right:'$', display:false}
        ]});"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #b2c7d9;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 상단 헤더 */
        .chat-header {
            background: #a8bdd1;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            border-bottom: 1px solid #94adc3;
        }

        .back-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            color: #333;
        }

        .back-btn svg {
            width: 22px;
            height: 22px;
        }

        .chat-header-title {
            flex: 1;
            font-size: 16px;
            font-weight: 700;
            color: #1a1a1a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 메시지 영역 */
        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 공통 말풍선 행 */
        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 100%;
        }

        /* Agent: 왼쪽 정렬 */
        .msg-row.agent {
            justify-content: flex-start;
        }

        /* User: 오른쪽 정렬 */
        .msg-row.user {
            justify-content: flex-end;
        }

        /* Agent 아바타 */
        .agent-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #4a90d9;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            align-self: flex-start;
        }

        .agent-avatar svg {
            width: 20px;
            height: 20px;
            color: #fff;
        }

        /* Agent 이름 + 말풍선 묶음 */
        .agent-body {
            display: flex;
            flex-direction: column;
            gap: 3px;
            max-width: 70%;
        }

        .agent-name {
            font-size: 12px;
            color: #444;
            margin-left: 2px;
        }

        /* 말풍선 공통 */
        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
        }

        /* Agent 말풍선 */
        .bubble.agent {
            background: #ffffff;
            border-top-left-radius: 4px;
        }

        /* User 말풍선 */
        .bubble.user {
            background: #fee500;
            border-top-right-radius: 4px;
            max-width: 70%;
        }

        /* 시간 표시 */
        .msg-time {
            font-size: 11px;
            color: #666;
            flex-shrink: 0;
            align-self: flex-end;
        }

        /* 로딩 말풍선 */
        .bubble.loading {
            display: flex;
            gap: 5px;
            align-items: center;
            padding: 14px 18px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #aaa;
            animation: bounce 1.2s infinite ease-in-out;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-7px); }
        }

        /* 마크다운 스타일 */
        .bubble.agent h1,
        .bubble.agent h2,
        .bubble.agent h3 {
            margin: 8px 0 4px;
            font-size: 15px;
        }

        .bubble.agent p {
            margin: 4px 0;
        }

        .bubble.agent ul,
        .bubble.agent ol {
            padding-left: 18px;
            margin: 4px 0;
        }

        .bubble.agent code {
            background: #f0f0f0;
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 13px;
        }

        .bubble.agent pre {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 6px 0;
        }

        .bubble.agent img {
            max-width: 100%;
            border-radius: 8px;
            margin: 6px 0;
        }

        /* 하단 입력 영역 */
        .chat-footer {
            background: #a8bdd1;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            border-top: 1px solid #94adc3;
        }

        .chat-input {
            flex: 1;
            border: none;
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 14px;
            outline: none;
            resize: none;
            height: 42px;
            line-height: 1.4;
            background: #ffffff;
            color: #111;
        }

        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #fee500;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s;
        }

        .send-btn:hover {
            background: #fdd800;
        }

        .send-btn:disabled {
            background: #ddd;
            cursor: default;
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            color: #333;
        }
    </style>
</head>
<body>

<!-- 헤더 -->
<div class="chat-header">
    <button class="back-btn" onclick="history.back()" title="뒤로">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
    </button>
    <div class="chat-header-title" id="header-title">챗봇</div>
</div>

<!-- 메시지 영역 -->
<div class="chat-body" id="chat-body"></div>

<!-- 하단 입력 -->
<div class="chat-footer">
    <textarea class="chat-input" id="chat-input" placeholder="메시지를 입력하세요" rows="1"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.269 20.876L5.999 12zm0 0h7.5"/>
        </svg>
    </button>
</div>

<script>
    // URL 파라미터에서 파일명 추출
    const params = new URLSearchParams(window.location.search);
    const fileName = params.get('file') || '';

    document.getElementById('header-title').textContent = fileName || 'PDF 챗봇';

    const chatBody = document.getElementById('chat-body');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');

    // 시간 포맷
    function formatTime(date) {
        const h = date.getHours();
        const m = String(date.getMinutes()).padStart(2, '0');
        const ampm = h < 12 ? '오전' : '오후';
        return `${ampm} ${h % 12 || 12}:${m}`;
    }

    // Agent 말풍선 추가
    function appendAgentBubble(html, isLoading = false) {
        const row = document.createElement('div');
        row.className = 'msg-row agent';

        const avatar = `
            <div class="agent-avatar">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
            </div>`;

        const bubbleContent = isLoading
            ? `<div class="bubble agent loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`
            : `<div class="bubble agent">${html}</div>`;

        const timeStr = isLoading ? '' : `<div class="msg-time">${formatTime(new Date())}</div>`;

        row.innerHTML = `
            ${avatar}
            <div class="agent-body">
                <div class="agent-name">AI</div>
                ${bubbleContent}
            </div>
            ${timeStr}
        `;

        chatBody.appendChild(row);
        chatBody.scrollTop = chatBody.scrollHeight;
        return row;
    }

    // User 말풍선 추가
    function appendUserBubble(text) {
        const row = document.createElement('div');
        row.className = 'msg-row user';
        row.innerHTML = `
            <div class="msg-time">${formatTime(new Date())}</div>
            <div class="bubble user">${escapeHtml(text)}</div>
        `;
        chatBody.appendChild(row);
        chatBody.scrollTop = chatBody.scrollHeight;
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // 수식 재렌더링
    function renderMath(el) {
        if (window.renderMathInElement) {
            renderMathInElement(el, {
                delimiters: [
                    { left: '$$', right: '$$', display: true },
                    { left: '$', right: '$', display: false }
                ],
                throwOnError: false
            });
        }
    }

    // 메시지 전송
    async function sendMessage() {
        const text = chatInput.value.trim();
        if (!text || !fileName) return;

        chatInput.value = '';
        chatInput.style.height = '42px';
        sendBtn.disabled = true;

        appendUserBubble(text);

        // 로딩 말풍선
        const loadingRow = appendAgentBubble('', true);

        try {
            const res = await fetch('http://127.0.0.1:8000/chat/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ file_name: fileName, message: text })
            });
            const data = await res.json();

            // 로딩 제거 후 실제 답변 표시
            loadingRow.remove();

            if (data.error) {
                appendAgentBubble(`<p style="color:#c00">${escapeHtml(data.error)}</p>`);
            } else {
                const answerHtml = marked.parse(data.answer || '');
                const agentRow = appendAgentBubble(answerHtml);
                renderMath(agentRow);
            }
        } catch (e) {
            loadingRow.remove();
            appendAgentBubble(`<p style="color:#c00">서버 연결 오류가 발생했습니다.</p>`);
        } finally {
            sendBtn.disabled = false;
            chatInput.focus();
        }
    }

    // Enter 전송 (Shift+Enter 줄바꿈)
    chatInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // 입력창 자동 높이 조절
    chatInput.addEventListener('input', () => {
        chatInput.style.height = '42px';
        chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
    });

    // 초기 인사 메시지
    if (fileName) {
        appendAgentBubble(marked.parse(
            `**${fileName}** 문서가 준비되었습니다.\n\n궁금한 내용을 질문해 주세요.`
        ));
    } else {
        appendAgentBubble(marked.parse('문서를 찾을 수 없습니다. 목록 화면으로 돌아가 주세요.'));
    }
</script>

</body>
</html>
