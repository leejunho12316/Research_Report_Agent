<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/docs/icon.png">
    <title>Research Report Agent</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: # f5f5f5;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 왼쪽 사이드바 */
        .sidebar {
            width: 200px;
            background: #ffffff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 24px;
            flex-shrink: 0;
        }

        .sidebar-banner {
            width: 100%;
            padding: 0 16px 16px 16px;
        }

        .sidebar-banner img {
            width: 100%;
            height: auto;
            display: block;
        }

        .upload-btn {
            width: calc(100% - 32px);
            height: 44px;
            border-radius: 10px;
            background: #ffffff;
            border: 1.5px solid #d0d0d0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #444;
            transition: background 0.15s, box-shadow 0.15s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .upload-btn:hover {
            background: #f0f0f0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.13);
        }

        .upload-btn svg {
            width: 18px;
            height: 18px;
            color: #555;
            flex-shrink: 0;
        }

        /* 숨겨진 파일 입력 */
        #file-input {
            display: none;
        }

        /* 오른쪽 메인 영역 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #ffffff;
            padding: 20px;
            padding-left:40px;
            padding-right:40px;
        }

        .main-header {
            padding: 20px 32px 12px 32px;
            border-bottom: 1px solid #eeeeee;
        }

        .main-header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #222;
            margin-top: 40px;
        }

        .search-wrapper {
            position: relative;
            margin-top: 10px;
        }

        .search-wrapper svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: #aaa;
            pointer-events: none;
        }

        #search-input {
            width: 100%;
            padding: 8px 12px 8px 34px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            color: #222;
        }

        #search-input:focus {
            border-color: #aaa;
        }

        /* 목록 */
        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 18px 32px;
            border-bottom: 1px solid #f0f0f0;
            gap: 16px;
            transition: background 0.1s;
        }

        .file-item.clickable {
            cursor: pointer;
        }

        .file-item.clickable:hover {
            background: #fafafa;
        }

        .file-item.disabled {
            opacity: 0.45;
            filter: grayscale(60%);
            cursor: default;
            pointer-events: none;
        }

        /* PDF 아이콘 원 */
        .pdf-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #22c55e;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .pdf-icon svg {
            width: 22px;
            height: 22px;
            color: #ffffff;
        }

        /* 파일 정보 */
        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 15px;
            font-weight: 600;
            color: #222;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-status {
            font-size: 13px;
            color: #888;
            margin-top: 3px;
        }

        .file-status.processing {
            color: #f59e0b;
        }

        .file-status.completed {
            color: #22c55e;
        }

        .file-status.failed {
            color: #ef4444;
        }

        /* 업로드 시각 */
        .file-time {
            font-size: 13px;
            color: #aaa;
            flex-shrink: 0;
            text-align: right;
            min-width: 80px;
        }

        /* 빈 상태 */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #bbb;
            gap: 12px;
            padding: 60px;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            color: #ddd;
        }

        .empty-state p {
            font-size: 15px;
        }

        .sidebar-right {
            width: 280px;
            background: #ffffff;
            border-left: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            padding: 20px 14px;
            flex-shrink: 0;
        }

        .cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .cal-header-title {
            font-size: 20px;
            font-weight: 700;
            color: #111;
        }

        .cal-nav {
            display: flex;
            gap: 4px;
        }

        .cal-nav button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 15px;
            color: #555;
            padding: 2px 5px;
            border-radius: 4px;
            line-height: 1;
        }

        .cal-nav button:hover {
            background: #f0f0f0;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
        }

        .cal-dow {
            font-size: 16px;
            color: #888;
            padding: 3px 0 6px;
            font-weight: 600;
        }

        .cal-dow.sun { color: #ef4444; }

        .cal-cell {
            font-size: 16px;
            padding: 6px 2px;
            border-radius: 50%;
            color: #333;
            line-height: 1.6;
            cursor: default;
        }

        .cal-cell.sun { color: #ef4444; }
        .cal-cell.other { color: #ccc; }
        .cal-cell.other.sun { color: #fca5a5; }

        .cal-cell.today {
            background: #1e3a8a;
            color: #fff !important;
            font-weight: 700;
            border-radius: 50%;
        }

        .sidebar-right-bottom {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid #e0e0e0;
        }

        .sidebar-right-bottom h3 {
            font-size: 16px;
            font-weight: 700;
            color: #111;
            margin-bottom: 10px;
        }

        .sidebar-feature-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 0;
            font-size: 14px;
            color: #000000;
            cursor: pointer;
        }

        .sidebar-feature-item:hover {
            text-decoration: underline;
        }

        .sidebar-feature-item svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        @media (max-width: 1200px) {
            .sidebar-right {
                display: none;
            }
        }

        .announcement-section {
            display: flex;
            gap: 36px;
            margin: 14px 0;
            max-width: 1024px;
        }

        .announcement-section a {
            flex: 1;
        }

        .announcement-section img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .announcement-section img:hover {
            opacity: 0.85;
        }

        .sidebar-bottom {
            margin-top: auto;
            width: 100%;
            padding: 12px 0 16px 0;
            border-top: 1px solid #e0e0e0;
        }

        .sidebar-menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            font-size: 14px;
            color: #444;
            cursor: pointer;
            transition: background 0.1s;
        }

        .sidebar-menu-item:hover {
            background: #f5f5f5;
        }

        .sidebar-menu-item svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            color: #555;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-banner">
        <img src="/docs/banner.png" alt="banner">
    </div>
    <button class="upload-btn" title="PDF 첨부" onclick="document.getElementById('file-input').click()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
        </svg>
        파일 업로드

    <input type="file" id="file-input" accept=".pdf" multiple onchange="handleFiles(this.files)">
    <div class="sidebar-bottom">

                <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" />
            </svg>

        </div>
        <div class="sidebar-menu-item">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 010-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            서비스 설정
        </div>
        <div class="sidebar-menu-item">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z" />
            </svg>
            도움말 및 지원
        </div>
    </div>
</div>

<div class="main">
    <div class="main-header">
        <div class="announcement-section">
            <a href="#"><img src="/docs/announcement1.png" alt="공지사항1"></a>
            <a href="#"><img src="/docs/announcement2.png" alt="공지사항2"></a>
            <a href="#"><img src="/docs/announcement3.png" alt="공지사항3"></a>
        </div>
        <div class="search-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35m0 0A7.5 7.5 0 104.5 4.5a7.5 7.5 0 0012.15 12.15z" />
            </svg>
            <input type="text" id="search-input" placeholder="검색..." />
        </div>
        <h1>채팅방 목록</h1>
    </div>

    <div class="file-list" id="file-list">
        <div class="empty-state" id="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
            </svg>
            <p>왼쪽 버튼을 눌러 PDF를 첨부하세요.</p>
        </div>
    </div>
</div>

<div class="sidebar-right">
    <div class="cal-header">
        <span class="cal-header-title" id="cal-title"></span>
        <div class="cal-nav">
            <button onclick="changeMonth(-1)">&#8249;</button>
            <button onclick="changeMonth(1)">&#8250;</button>
        </div>
    </div>
    <div class="cal-grid">
        <div class="cal-dow sun">일</div>
        <div class="cal-dow">월</div>
        <div class="cal-dow">화</div>
        <div class="cal-dow">수</div>
        <div class="cal-dow">목</div>
        <div class="cal-dow">금</div>
        <div class="cal-dow">토</div>
    </div>
    <div class="cal-grid" id="cal-days"></div>
    <div class="sidebar-right-bottom">
        <h3>유용한 기능 알아보기</h3>
        <div class="sidebar-feature-item">
            <!-- 지구본 -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253" />
            </svg>
            다양한 언어 지원
        </div>
        <div class="sidebar-feature-item">
            <!-- 북마크 -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0z" />
            </svg>
            중요한 순간 북마크
        </div>
        <div class="sidebar-feature-item">
            <!-- 하이라이트 -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.53 16.122a3 3 0 00-5.78 1.128 2.25 2.25 0 01-2.4 2.245 4.5 4.5 0 008.4-2.245c0-.399-.078-.78-.22-1.128zm0 0a15.998 15.998 0 003.388-1.62m-5.043-.025a15.994 15.994 0 011.622-3.395m3.42 3.42a15.995 15.995 0 004.764-4.648l3.876-5.814a1.151 1.151 0 00-1.597-1.597L14.146 6.32a15.996 15.996 0 00-4.649 4.763m3.42 3.42a6.776 6.776 0 00-3.42-3.42" />

            강조할 내용 하이라이트

                <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z" />
            </svg>
            실시간 메모
        </div>
        <div class="sidebar-feature-item">
            <!-- 이메일 -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
            </svg>
            이메일로 공유
        </div>
    </div>
</div>

<script>
    const fileList = document.getElementById('file-list');
    const emptyState = document.getElementById('empty-state');

    function formatTime(date) {
        const h = date.getHours();
        const m = String(date.getMinutes()).padStart(2, '0');
        const ampm = h < 12 ? '오전' : '오후';
        const hh = h % 12 || 12;
        return `${ampm} ${hh}:${m}`;
    }

    function openChat(fileName) {
        window.location.href = `chat.html?file=${encodeURIComponent(fileName)}`;
    }

    // 페이지 로드 시 기존 처리 완료 폴더 불러오기
    async function loadExistingFiles() {
        try {
            const res = await fetch('http://127.0.0.1:8000/files/');
            const data = await res.json();
            if (!data.files || data.files.length === 0) return;

            if (emptyState.parentNode) emptyState.remove();

            data.files.forEach(f => {
                const item = document.createElement('div');
                const isCompleted = f.status === 'completed';
                item.className = 'file-item' + (isCompleted ? ' clickable' : '');
                if (isCompleted) {
                    item.onclick = () => openChat(f.name);
                }
                const statusCls = isCompleted ? 'completed' : 'processing';
                const statusText = isCompleted ? '처리 완료!' : '진행중...';
                item.innerHTML = `
                    <div class="pdf-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                        </svg>
                    </div>
                    <div class="file-info">
                        <div class="file-name">${escapeHtml(f.name)}</div>
                        <div class="file-status ${statusCls}">${statusText}</div>
                    </div>
                    <div class="file-time"></div>
                `;
                fileList.appendChild(item);
            });
        } catch (e) {
            // 서버 미실행 등의 경우 조용히 무시
        }
    }

    loadExistingFiles();

    function handleFiles(files) {
        if (!files || files.length === 0) return;

        // 빈 상태 제거
        if (emptyState.parentNode) {
            emptyState.remove();
        }

        Array.from(files).forEach(file => uploadFile(file));

        // input 초기화 (같은 파일 재선택 허용)
        document.getElementById('file-input').value = '';
    }

    async function uploadFile(file) {
        const itemId = 'item-' + Date.now() + '-' + Math.random().toString(36).slice(2);
        const now = new Date();

        // 목록 항목 생성
        const item = document.createElement('div');
        item.className = 'file-item';
        item.id = itemId;
        item.dataset.fileName = file.name.replace(/\.pdf$/i, '');
        item.innerHTML = `
            <div class="pdf-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                </svg>
            </div>
            <div class="file-info">
                <div class="file-name">${escapeHtml(file.name)}</div>
                <div class="file-status processing" id="${itemId}-status">진행중...</div>
            </div>
            <div class="file-time">${formatTime(now)}</div>
        `;
        fileList.insertBefore(item, fileList.firstChild);

        // 업로드
        const formData = new FormData();
        formData.append('file', file);

        try {
            const response = await fetch('http://127.0.0.1:8000/upload/', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            if (data.task_id) {
                pollStatus(data.task_id, itemId);
            } else {
                setStatus(itemId, 'failed', '업로드 실패');
            }
        } catch (e) {
            setStatus(itemId, 'failed', '서버 연결 오류');
        }
    }

    function pollStatus(taskId, itemId) {
        const interval = setInterval(async () => {
            try {
                const res = await fetch(`http://127.0.0.1:8000/status/${taskId}`);
                const data = await res.json();

                if (data.status === 'completed') {
                    clearInterval(interval);
                    setStatus(itemId, 'completed', '처리 완료!');
                } else if (data.status === 'failed') {
                    clearInterval(interval);
                    setStatus(itemId, 'failed', '처리 실패');
                } else if (data.progress) {
                    setStatus(itemId, 'processing', data.progress);
                }
            } catch (e) {
                clearInterval(interval);
                setStatus(itemId, 'failed', '상태 확인 오류');
            }
        }, 2000);
    }

    function setStatus(itemId, cls, text) {
        const el = document.getElementById(itemId + '-status');
        if (!el) return;
        el.className = 'file-status ' + cls;
        el.textContent = text;

        if (cls === 'completed') {
            const item = document.getElementById(itemId);
            if (item) {
                item.classList.add('clickable');
                item.onclick = () => openChat(item.dataset.fileName);
            }
        }
    }

    document.getElementById('search-input').addEventListener('input', function () {
        const query = this.value.trim().toLowerCase();
        const items = document.querySelectorAll('.file-item');
        items.forEach(item => {
            const name = item.querySelector('.file-name')?.textContent.toLowerCase() || '';
            item.style.display = (!query || name.includes(query)) ? '' : 'none';
        });
    });

    let calYear, calMonth;

    function renderCalendar(year, month) {
        calYear = year;
        calMonth = month;
        document.getElementById('cal-title').textContent = `${year}.${month + 1}`;

        const grid = document.getElementById('cal-days');
        grid.innerHTML = '';
        const today = new Date();
        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        const prevLastDate = new Date(year, month, 0).getDate();

        for (let i = 0; i < firstDay; i++) {
            const d = document.createElement('div');
            d.className = 'cal-cell other' + (i === 0 ? ' sun' : '');
            d.textContent = prevLastDate - firstDay + 1 + i;
            grid.appendChild(d);
        }

        for (let i = 1; i <= lastDate; i++) {
            const d = document.createElement('div');
            const dow = (firstDay + i - 1) % 7;
            d.className = 'cal-cell' + (dow === 0 ? ' sun' : '');
            if (i === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                d.classList.add('today');
            }
            d.textContent = i;
            grid.appendChild(d);
        }

        const filled = firstDay + lastDate;
        const remaining = filled % 7 === 0 ? 0 : 7 - (filled % 7);
        for (let i = 1; i <= remaining; i++) {
            const d = document.createElement('div');
            const dow = (filled + i - 1) % 7;
            d.className = 'cal-cell other' + (dow === 0 ? ' sun' : '');
            d.textContent = i;
            grid.appendChild(d);
        }
    }

    function changeMonth(dir) {
        calMonth += dir;
        if (calMonth < 0) { calMonth = 11; calYear--; }
        if (calMonth > 11) { calMonth = 0; calYear++; }
        renderCalendar(calYear, calMonth);
    }

    const _now = new Date();
    renderCalendar(_now.getFullYear(), _now.getMonth());

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
</script>

</body>
</html>
